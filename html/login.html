<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Fassum</title>
    <link rel="stylesheet" href="styles/auth_style.css">
    <link rel="preload" href="fonts/Forum-Regular.ttf" as="font" type="font/ttf" crossorigin>
</head>
<body>
    <div class="auth-wrapper">
        <div class="bg-circle circle-1"></div>
        <div class="bg-circle circle-2"></div>

        <div class="auth-card">
            <div class="auth-header">
                <h1 class="logo">Fassum</h1>
                <h2>С возвращением!</h2>
                <p>Войдите, чтобы продолжить общение</p>
            </div>

            <form id="loginForm" class="auth-form">
                <div class="input-group">
                    <label for="loginEmail">E-mail или Имя пользователя</label>
                    <input type="text" id="loginEmail" placeholder="Ваш логин" required autocomplete="username">
                    <span class="error-message" id="loginError">Пользователь не найден!</span>
                </div>

                <div class="input-group">
                    <label for="loginPassword">Пароль</label>
                    <input type="password" id="loginPassword" placeholder="Ваш пароль" required autocomplete="current-password">
                    <span class="error-message" id="loginPasswordError">Неверный пароль!</span>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe">
                        <span>Запомнить меня</span>
                    </label>
                    <a href="#" class="forgot-password">Забыли пароль?</a>
                </div>

                <button type="submit" class="submit-btn" id="loginSubmitBtn">
                    <span class="btn-text">Войти</span>
                    <span class="loader" style="display: none;"></span>
                </button>
            </form>

            <div class="auth-footer">
                Нет аккаунта? <a href="register.html" class="auth-link">Зарегистрироваться</a>
            </div>
        </div>
    </div>

    <script src="scripts/auth.js"></script>
</body>
</html>
