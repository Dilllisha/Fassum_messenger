{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Fassum</title>
    <link rel="stylesheet" href="{% static 'styles/auth_style.css' %}">
    <link rel="preload" href="{% static 'fonts/Forum-Regular.ttf' %}" as="font" type="font/ttf" crossorigin>
    <link rel="icon" type="image/svg+xml" href="{% static 'images/favicon.svg' %}">
</head>
<body>
    <div class="auth-wrapper">
        <div class="bg-circle circle-1"></div>
        <div class="bg-circle circle-2"></div>

        <div class="auth-card">
            <div class="auth-header">
                <h1 class="logo"><a href="{% url 'home' %}">Fassum</a></h1>
                <h2>С возвращением!</h2>
                <p>Войдите, чтобы продолжить общение</p>
            </div>

            <form method="POST" action="{% url 'login' %}" id="loginForm" class="auth-form">
                {% csrf_token %}

                {% if error_message %}
                    <div style="color: #ef4444; background: rgba(239, 68, 68, 0.1); padding: 10px; border-radius: 8px; margin-bottom: 15px; text-align: center;">
                        {{ error_message }}
                    </div>
                {% endif %}

                <div class="input-group">
                    <label for="loginEmail">E-mail или Уникальный тег</label>
                    <input type="text" id="loginEmail" name="username" placeholder="mail@example.com или tag" required autocomplete="username">
                </div>

                <div class="input-group">
                    <label for="loginPassword">Пароль</label>
                    <input type="password" id="loginPassword" name="password" placeholder="Ваш пароль" required autocomplete="current-password">
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe" name="remember_me">
                        <span>Запомнить меня</span>
                    </label>
                    <a href="{% url 'forgot_password' %}" class="forgot-password">Забыли пароль?</a>
                </div>

                <button type="submit" class="submit-btn" id="loginSubmitBtn">
                    <span class="btn-text">Войти</span>
                    <span class="loader" style="display: none;"></span>
                </button>
            </form>

            <div class="auth-footer">
                Нет аккаунта? <a href="{% url 'register' %}" class="auth-link">Зарегистрироваться</a>
            </div>
        </div>
    </div>

    <script src="{% static 'scripts/auth.js' %}"></script>
</body>
</html>
