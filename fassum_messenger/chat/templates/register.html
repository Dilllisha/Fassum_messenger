{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — Fassum</title>
    <link rel="stylesheet" href="{% static 'styles/auth_style.css' %}">
    <link rel="preload" href="{% static 'fonts/Forum-Regular.ttf' %}" as="font" type="font/ttf" crossorigin>
    <link rel="icon" type="image/svg+xml" href="{% static 'images/favicon.svg' %}">
</head>
<body>
    <div class="auth-wrapper">
        <div class="bg-circle circle-1"></div>
        <div class="bg-circle circle-2"></div>

        <div class="auth-card">
            <div class="auth-header">
                <h1 class="logo"><a href="{% url 'home' %}">Fassum</a></h1>
                <h2>Создать аккаунт</h2>
                <p>Начните общаться безопасно прямо сейчас</p>
            </div>

            <form method="POST" action="{% url 'register' %}" class="auth-form">
                {% csrf_token %}

                {% if error_message %}
                    <div style="color: #ef4444; background: rgba(239, 68, 68, 0.1); padding: 10px; border-radius: 8px; margin-bottom: 15px; text-align: center;">
                        {{ error_message }}
                    </div>
                {% endif %}

                <div class="input-group">
                    <label for="first_name">Ваше имя</label>
                    <input type="text" id="first_name" name="first_name" placeholder="Например, Данила" required autocomplete="name">
                </div>

                <div class="input-group">
                    <label for="username">Уникальный тег (без @)</label>
                    <input type="text" id="username" name="username" placeholder="danila" required autocomplete="off">
                </div>

                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="Ваш почтовый ящик" required autocomplete="email">
                </div>

                <div class="input-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" name="password" placeholder="От 6 до 13 символов" required autocomplete="new-password">
                </div>

                <div class="input-group">
                    <label for="confirmPassword">Повторите пароль</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Пароль еще раз" required autocomplete="new-password">
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    <span class="btn-text">Зарегистрироваться</span>
                </button>
            </form>

            <div class="auth-footer">
                Уже есть аккаунт? <a href="{% url 'login' %}" class="auth-link">Войти</a>
            </div>
        </div>
    </div>

    <script src="{% static 'scripts/auth.js' %}"></script>
</body>
</html>
